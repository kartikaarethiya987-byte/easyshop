<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Product Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden; pointer-events:none;">
        <input type="text" class="search-input" placeholder="Search…"/>
        <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <div class="nav-auth" id="navAuth"></div>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== PRODUCT DETAIL ===== -->
  <main class="container product-detail-page">

    <!-- Breadcrumb nav -->
    <nav class="breadcrumb">
      <a href="index.html">Home</a>
      <i class="fa-solid fa-chevron-right"></i>
      <span id="breadcrumbCat">Category</span>
      <i class="fa-solid fa-chevron-right"></i>
      <span id="breadcrumbName">Product</span>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastMsg">Added to cart!</span>
    </div>

    <!-- Product detail panel – filled by JS -->
    <div class="product-detail-panel" id="productDetail">
      <div class="detail-loading">
        <i class="fa-solid fa-spinner fa-spin"></i> Loading product…
      </div>
    </div>

    <!-- Related products -->
    <div class="related-section">
      <h2 class="section-title">You May Also Like</h2>
      <div class="product-grid" id="relatedGrid"></div>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner container">
      <div class="footer-brand">
        <span class="logo-text" style="font-size:1.3rem">SHOP<em>EASY</em></span>
        <p>Smart shopping, simplified.</p>
      </div>
      <div class="footer-links">
        <h4>Pages</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 ShopEasy. Made with <i class="fa-solid fa-heart"></i></p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    /* ---- product.html specific init ---- */
    updateCartBadge();   // Sync navbar badge
    renderNavAuth();     // Show login/register or user name
    renderProductPage(); // Draw product details from URL param
  </script>
</body>
</html>
