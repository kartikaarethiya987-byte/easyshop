<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Your Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden;pointer-events:none;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <div class="nav-auth" id="navAuth"></div>
        <a href="cart.html" class="nav-link cart-nav-btn active-page" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== CART PAGE ===== -->
  <main class="container cart-page">
    <div class="cart-page-header">
      <h1 class="page-title">
        <i class="fa-solid fa-cart-shopping"></i> Your Cart
      </h1>
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Continue Shopping
      </a>
    </div>

    <div class="toast" id="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastMsg">Cart updated!</span>
    </div>

    <!--
      renderCartPage() reads the current user's cart from localStorage,
      renders items with +/− controls, and shows the checkout button.
      Checkout calls processCheckout() which reduces stock and saves the order.
    -->
    <div class="cart-layout" id="cartLayout"></div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner container">
      <div class="footer-brand">
        <span class="logo-text" style="font-size:1.3rem">SHOP<em>EASY</em></span>
        <p>Smart shopping, simplified.</p>
      </div>
      <div class="footer-links">
        <h4>Pages</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="orders.html">My Orders</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 ShopEasy. Made with <i class="fa-solid fa-heart"></i></p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    /* ── cart.html init ── */

    seedDefaultData();

    // 🔒 PROTECTED: must be logged in — redirects to login.html if not
    protectPage();

    renderNavAuth();
    updateCartBadge();
    renderCartPage();
  </script>
</body>
</html>
