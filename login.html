<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden;pointer-events:none;flex:1;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== LOGIN CARD ===== -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-card-header">
        <div class="auth-icon"><i class="fa-solid fa-right-to-bracket"></i></div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your ShopEasy account</p>
      </div>

      <!-- Admin credentials hint box -->
      <div class="admin-hint">
        <i class="fa-solid fa-shield-halved"></i>
        <div>
          <strong>Admin login:</strong>&nbsp;
          admin@example.com &nbsp;/&nbsp; 123456
        </div>
      </div>

      <!-- Feedback message (shown after submit) -->
      <div class="auth-message" id="authMessage" style="display:none;"></div>

      <form class="auth-form" id="loginForm" novalidate>

        <!-- Email field -->
        <div class="form-group">
          <label class="form-label" for="loginEmail">
            <i class="fa-solid fa-envelope"></i> Email Address
          </label>
          <input type="email" id="loginEmail" class="form-input"
            placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label class="form-label" for="loginPassword">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-password-wrap">
            <input type="password" id="loginPassword" class="form-input"
              placeholder="Enter your password" autocomplete="current-password" required/>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Submit button -->
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="btn-text">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </span>
          <span class="btn-spinner" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin"></i> Signing in…
          </span>
        </button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-switch">
        Don't have an account?
        <a href="register.html" class="auth-switch-link">
          Create one free <i class="fa-solid fa-arrow-right"></i>
        </a>
      </p>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner container">
      <div class="footer-brand">
        <span class="logo-text" style="font-size:1.3rem">SHOP<em>EASY</em></span>
        <p>Smart shopping, simplified.</p>
      </div>
      <div class="footer-links">
        <h4>Pages</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 ShopEasy. Made with <i class="fa-solid fa-heart"></i></p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    /* ── login.html init ────────────────────────────────────────── */
    seedDefaultData();
    updateCartBadge();

    /*
     * REDIRECT if already logged in.
     * Admins go to admin.html, regular users go to index.html.
     * (loginAndRedirect will handle the post-login bounce-back.)
     */
    if (isLoggedIn()) {
      window.location.href = isAdmin() ? "admin.html" : "index.html";
    }

    /* ── Password visibility toggle ─────────────────────────────── */
    document.getElementById("togglePw").addEventListener("click", function () {
      var pw   = document.getElementById("loginPassword");
      var icon = this.querySelector("i");
      if (pw.type === "password") {
        pw.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        pw.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      }
    });

    /* ── Form submit ─────────────────────────────────────────────── */
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      var email    = document.getElementById("loginEmail").value.trim();
      var password = document.getElementById("loginPassword").value;

      /* Clear any existing inline field errors */
      clearAllErrors(["emailError", "passwordError"]);
      setMsgHidden();

      /* Client-side validation before hitting the auth logic */
      var valid = true;

      if (!email) {
        setFieldError("loginEmail", "emailError", "Please enter your email address.");
        valid = false;
      } else if (!isValidEmail(email)) {
        setFieldError("loginEmail", "emailError", "Please enter a valid email address.");
        valid = false;
      }

      if (!password) {
        setFieldError("loginPassword", "passwordError", "Please enter your password.");
        valid = false;
      }

      if (!valid) return;

      /* Show loading spinner on the button */
      document.querySelector("#loginBtn .btn-text").style.display    = "none";
      document.querySelector("#loginBtn .btn-spinner").style.display = "inline";
      document.getElementById("loginBtn").disabled = true;

      /*
       * Small artificial delay so the spinner is visible —
       * gives the user feedback that "something is happening".
       */
      setTimeout(function () {

        /*
         * loginAndRedirect() lives in script.js §15.
         * On SUCCESS: saves session, reads localStorage("se_redirect"),
         *   and calls window.location.href — so this setTimeout callback
         *   NEVER continues after a successful login.
         * On FAILURE: returns { success: false, message: "…" }
         */
        var result = loginAndRedirect(email, password);

        /* Only reached when login FAILED */
        document.querySelector("#loginBtn .btn-text").style.display    = "inline";
        document.querySelector("#loginBtn .btn-spinner").style.display = "none";
        document.getElementById("loginBtn").disabled = false;

        if (!result.success) {
          setMsg("error",
            '<i class="fa-solid fa-circle-xmark"></i> ' + result.message
          );
          /* Highlight the password field */
          setFieldError("loginPassword", "passwordError", "Check your credentials and try again.");
        }

      }, 600);
    });

    /* ── Local helpers ───────────────────────────────────────────── */

    function setMsg(type, html) {
      var box       = document.getElementById("authMessage");
      box.className = "auth-message auth-message--" + type;
      box.innerHTML = html;
      box.style.display = "flex";
    }

    function setMsgHidden() {
      var box = document.getElementById("authMessage");
      if (box) box.style.display = "none";
    }
  </script>
</body>
</html>
