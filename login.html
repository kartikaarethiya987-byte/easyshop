<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <!-- ===== NAVBAR (minimal, no search) ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <!-- Keep search invisible for auth pages -->
      <div class="search-wrap" style="visibility:hidden; pointer-events:none; flex:1;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== LOGIN CARD ===== -->
  <main class="auth-page">
    <div class="auth-card">

      <!-- Card header -->
      <div class="auth-card-header">
        <div class="auth-icon"><i class="fa-solid fa-right-to-bracket"></i></div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your ShopEasy account</p>
      </div>

      <!-- Toast / message area -->
      <div class="auth-message" id="authMessage" style="display:none;"></div>

      <!-- Login form -->
      <form class="auth-form" id="loginForm" novalidate>

        <!-- Email field -->
        <div class="form-group">
          <label class="form-label" for="loginEmail">
            <i class="fa-solid fa-envelope"></i> Email Address
          </label>
          <input
            type="email"
            id="loginEmail"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label class="form-label" for="loginPassword">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-password-wrap">
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <!-- Toggle password visibility -->
            <button type="button" class="toggle-pw" id="toggleLoginPw" aria-label="Toggle password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Submit button -->
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> Sign In</span>
          <span class="btn-spinner" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>

      </form>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Switch to register -->
      <p class="auth-switch">
        Don't have an account?
        <a href="register.html" class="auth-switch-link">Create one free <i class="fa-solid fa-arrow-right"></i></a>
      </p>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    /* ---- login.html specific init ---- */
    updateCartBadge();   // Keep cart badge in sync

    /* If user is already logged in, redirect to homepage */
    if (getLoggedInUser()) {
      window.location.href = "index.html";
    }

    /* Toggle password visibility */
    document.getElementById("toggleLoginPw").addEventListener("click", function () {
      const pw = document.getElementById("loginPassword");
      const icon = this.querySelector("i");
      if (pw.type === "password") {
        pw.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        pw.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      }
    });

    /* Handle login form submit */
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();   // Prevent page reload

      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      /* Clear previous errors */
      document.getElementById("emailError").textContent    = "";
      document.getElementById("passwordError").textContent = "";

      /* Basic front-end validation */
      let valid = true;
      if (!email) {
        document.getElementById("emailError").textContent = "Please enter your email.";
        valid = false;
      }
      if (!password) {
        document.getElementById("passwordError").textContent = "Please enter your password.";
        valid = false;
      }
      if (!valid) return;

      /* Show spinner */
      document.querySelector(".btn-text").style.display   = "none";
      document.querySelector(".btn-spinner").style.display = "inline";

      /* Simulate a small delay (like a real API call) then validate */
      setTimeout(() => {
        const result = loginUser(email, password);   // auth function in script.js

        document.querySelector(".btn-text").style.display   = "inline";
        document.querySelector(".btn-spinner").style.display = "none";

        if (result.success) {
          showAuthMessage("success", `<i class="fa-solid fa-circle-check"></i> Welcome back, ${result.name}! Redirecting…`);
          /* Redirect to homepage after 1.5 seconds */
          setTimeout(() => { window.location.href = "index.html"; }, 1500);
        } else {
          showAuthMessage("error", `<i class="fa-solid fa-circle-xmark"></i> ${result.message}`);
        }
      }, 800);
    });

    /* Helper to show coloured message box */
    function showAuthMessage(type, html) {
      const box = document.getElementById("authMessage");
      box.className = `auth-message auth-message--${type}`;
      box.innerHTML = html;
      box.style.display = "flex";
    }
  </script>
</body>
</html>
