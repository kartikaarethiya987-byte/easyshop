<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden;pointer-events:none;flex:1;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== REGISTER CARD ===== -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-card-header">
        <div class="auth-icon auth-icon--register">
          <i class="fa-solid fa-user-plus"></i>
        </div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Join ShopEasy — free &amp; takes 30 seconds</p>
      </div>

      <!-- Feedback message box -->
      <div class="auth-message" id="authMessage" style="display:none;"></div>

      <form class="auth-form" id="registerForm" novalidate>

        <!-- Full name -->
        <div class="form-group">
          <label class="form-label" for="regName">
            <i class="fa-solid fa-user"></i> Full Name
          </label>
          <input type="text" id="regName" class="form-input"
            placeholder="Jane Doe" autocomplete="name" required/>
          <span class="field-error" id="nameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="regEmail">
            <i class="fa-solid fa-envelope"></i> Email Address
          </label>
          <input type="email" id="regEmail" class="form-input"
            placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Password with strength meter -->
        <div class="form-group">
          <label class="form-label" for="regPassword">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-password-wrap">
            <input type="password" id="regPassword" class="form-input"
              placeholder="Min 6 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <!-- Live password strength bar (updated by JS below) -->
          <div class="pw-strength" id="pwStrength" style="display:none;">
            <div class="pw-strength-bar" id="pwStrengthBar"></div>
            <span class="pw-strength-label" id="pwStrengthLabel"></span>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Confirm password -->
        <div class="form-group">
          <label class="form-label" for="regConfirm">
            <i class="fa-solid fa-lock"></i> Confirm Password
          </label>
          <div class="input-password-wrap">
            <input type="password" id="regConfirm" class="form-input"
              placeholder="Repeat your password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="toggleConfirm">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>

        <!-- Terms checkbox -->
        <div class="form-group form-check">
          <input type="checkbox" id="agreeTerms" class="check-input"/>
          <label for="agreeTerms" class="check-label">
            I agree to the <a href="#" class="auth-link">Terms &amp; Conditions</a>
          </label>
          <span class="field-error" id="termsError"></span>
        </div>

        <!-- Submit -->
        <button type="submit" class="auth-btn auth-btn--register" id="registerBtn">
          <span class="btn-text">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </span>
          <span class="btn-spinner" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin"></i> Creating…
          </span>
        </button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html" class="auth-switch-link">
          Sign in here <i class="fa-solid fa-arrow-right"></i>
        </a>
      </p>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner container">
      <div class="footer-brand">
        <span class="logo-text" style="font-size:1.3rem">SHOP<em>EASY</em></span>
        <p>Smart shopping, simplified.</p>
      </div>
      <div class="footer-links">
        <h4>Pages</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 ShopEasy. Made with <i class="fa-solid fa-heart"></i></p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    /* ── register.html init ─────────────────────────────────────── */
    seedDefaultData();
    updateCartBadge();

    /* If already logged in, send to correct home */
    if (isLoggedIn()) {
      window.location.href = isAdmin() ? "admin.html" : "index.html";
    }

    /* ── Password / confirm visibility toggles ─────────────────── */
    function makeToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener("click", function () {
        var pw   = document.getElementById(inputId);
        var icon = this.querySelector("i");
        if (pw.type === "password") {
          pw.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          pw.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      });
    }
    makeToggle("togglePw",      "regPassword");
    makeToggle("toggleConfirm", "regConfirm");

    /* ── Live password strength meter ───────────────────────────── */
    document.getElementById("regPassword").addEventListener("input", function () {
      var val   = this.value;
      var wrap  = document.getElementById("pwStrength");
      var bar   = document.getElementById("pwStrengthBar");
      var label = document.getElementById("pwStrengthLabel");

      if (!val) { wrap.style.display = "none"; return; }
      wrap.style.display = "flex";

      /* Score 0–5 based on length, uppercase, digits, symbols */
      var score = 0;
      if (val.length >= 6)           score++;
      if (val.length >= 10)          score++;
      if (/[A-Z]/.test(val))         score++;
      if (/[0-9]/.test(val))         score++;
      if (/[^A-Za-z0-9]/.test(val))  score++;

      var levels = [
        { l: "Too short", c: "#EF4444", w: "20%"  },
        { l: "Weak",      c: "#F97316", w: "40%"  },
        { l: "Fair",      c: "#EAB308", w: "60%"  },
        { l: "Good",      c: "#22C55E", w: "80%"  },
        { l: "Strong",    c: "#16A34A", w: "100%" }
      ];
      var lvl        = levels[Math.min(score, 4)];
      bar.style.cssText  = "width:" + lvl.w + ";background:" + lvl.c;
      label.textContent  = lvl.l;
      label.style.color  = lvl.c;
    });

    /* ── Form submit ─────────────────────────────────────────────── */
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      var name     = document.getElementById("regName").value.trim();
      var email    = document.getElementById("regEmail").value.trim();
      var password = document.getElementById("regPassword").value;
      var confirm  = document.getElementById("regConfirm").value;
      var agreed   = document.getElementById("agreeTerms").checked;

      /* Clear previous errors */
      clearAllErrors(["nameError","emailError","passwordError","confirmError","termsError"]);
      setMsgHidden();

      /* Validate each field in turn */
      var valid = true;

      if (!name) {
        setFieldError("regName", "nameError", "Please enter your full name.");
        valid = false;
      } else if (name.length < 2) {
        setFieldError("regName", "nameError", "Name must be at least 2 characters.");
        valid = false;
      }

      if (!email) {
        setFieldError("regEmail", "emailError", "Please enter your email address.");
        valid = false;
      } else if (!isValidEmail(email)) {
        setFieldError("regEmail", "emailError", "Please enter a valid email address.");
        valid = false;
      }

      if (!password) {
        setFieldError("regPassword", "passwordError", "Please create a password.");
        valid = false;
      } else if (password.length < 6) {
        setFieldError("regPassword", "passwordError", "Password must be at least 6 characters.");
        valid = false;
      }

      if (!confirm) {
        setFieldError("regConfirm", "confirmError", "Please confirm your password.");
        valid = false;
      } else if (password && confirm !== password) {
        setFieldError("regConfirm", "confirmError", "Passwords do not match.");
        valid = false;
      }

      if (!agreed) {
        setFieldError("agreeTerms", "termsError", "You must agree to the Terms & Conditions.");
        valid = false;
      }

      if (!valid) return;

      /* Show loading spinner */
      document.querySelector("#registerBtn .btn-text").style.display    = "none";
      document.querySelector("#registerBtn .btn-spinner").style.display = "inline";
      document.getElementById("registerBtn").disabled = true;

      setTimeout(function () {
        /*
         * registerUser() (script.js §3):
         *   On SUCCESS: adds the new user to localStorage, returns { success: true }
         *   On FAILURE: returns { success: false, message: "…" } (duplicate email)
         */
        var result = registerUser(name, email, password);

        document.querySelector("#registerBtn .btn-text").style.display    = "inline";
        document.querySelector("#registerBtn .btn-spinner").style.display = "none";
        document.getElementById("registerBtn").disabled = false;

        if (result.success) {
          setMsg("success",
            '<i class="fa-solid fa-circle-check"></i> ' +
            'Account created! Redirecting to login…'
          );
          /* Account registered — send to login so they sign in properly */
          setTimeout(function () {
            window.location.href = "login.html";
          }, 1600);
        } else {
          setMsg("error",
            '<i class="fa-solid fa-circle-xmark"></i> ' + result.message
          );
          /* Highlight the email field since that's where the conflict is */
          setFieldError("regEmail", "emailError", result.message);
        }

      }, 600);
    });

    /* ── Local helpers ───────────────────────────────────────────── */

    function setMsg(type, html) {
      var box       = document.getElementById("authMessage");
      box.className = "auth-message auth-message--" + type;
      box.innerHTML = html;
      box.style.display = "flex";
    }

    function setMsgHidden() {
      var box = document.getElementById("authMessage");
      if (box) box.style.display = "none";
    }
  </script>
</body>
</html>
