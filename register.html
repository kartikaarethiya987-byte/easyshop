<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <!-- ===== NAVBAR (minimal) ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden;pointer-events:none;flex:1;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== REGISTER CARD ===== -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-card-header">
        <div class="auth-icon auth-icon--register">
          <i class="fa-solid fa-user-plus"></i>
        </div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Join ShopEasy — free &amp; takes 30 seconds</p>
      </div>

      <!-- API warning banner (shown if backend is unreachable) -->
      <div class="api-status" id="apiStatus" style="display:none;"></div>

      <!-- Success / error message -->
      <div class="auth-message" id="authMessage" style="display:none;"></div>

      <!--
        On submit this form calls POST /api/auth/register via registerUser() in script.js.
        Password is hashed on the server with bcrypt — never sent in plain text after POST.
        On success: JWT token saved, redirect to index.html.
      -->
      <form class="auth-form" id="registerForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="regName">
            <i class="fa-solid fa-user"></i> Full Name
          </label>
          <input type="text" id="regName" class="form-input"
            placeholder="Jane Doe" autocomplete="name" required/>
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">
            <i class="fa-solid fa-envelope"></i> Email Address
          </label>
          <input type="email" id="regEmail" class="form-input"
            placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-password-wrap">
            <input type="password" id="regPassword" class="form-input"
              placeholder="Min 6 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <!-- Live strength meter — pure client-side UI, doesn't call API -->
          <div class="pw-strength" id="pwStrength" style="display:none;">
            <div class="pw-strength-bar" id="pwStrengthBar"></div>
            <span class="pw-strength-label" id="pwStrengthLabel"></span>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regConfirm">
            <i class="fa-solid fa-lock"></i> Confirm Password
          </label>
          <div class="input-password-wrap">
            <input type="password" id="regConfirm" class="form-input"
              placeholder="Repeat your password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Toggle confirm password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>

        <div class="form-group form-check">
          <input type="checkbox" id="agreeTerms" class="check-input"/>
          <label for="agreeTerms" class="check-label">
            I agree to the <a href="#" class="auth-link">Terms &amp; Conditions</a>
          </label>
          <span class="field-error" id="termsError"></span>
        </div>

        <button type="submit" class="auth-btn auth-btn--register" id="registerBtn">
          <span class="btn-text">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </span>
          <span class="btn-spinner" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin"></i> Creating account…
          </span>
        </button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html" class="auth-switch-link">
          Sign in here <i class="fa-solid fa-arrow-right"></i>
        </a>
      </p>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    /* ── register.html page init ── */
    updateCartBadge();

    // Already logged in? Skip registration
    if (isLoggedIn()) window.location.href = "index.html";

    // Check backend health
    (async () => {
      try {
        const res  = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        if (data.status !== "OK") throw new Error();
      } catch {
        const banner = document.getElementById("apiStatus");
        banner.style.display = "flex";
        banner.className     = "api-status api-status--warn";
        banner.innerHTML     = `
          <i class="fa-solid fa-triangle-exclamation"></i>
          Backend not reachable. Start the server at
          <strong>http://localhost:5000</strong> first.
        `;
      }
    })();

    // Password show/hide helpers
    function makeToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener("click", function () {
        const pw = document.getElementById(inputId);
        const ic = this.querySelector("i");
        pw.type  = pw.type === "password" ? "text" : "password";
        ic.classList.toggle("fa-eye",       pw.type === "password");
        ic.classList.toggle("fa-eye-slash", pw.type !== "password");
      });
    }
    makeToggle("togglePw",      "regPassword");
    makeToggle("toggleConfirm", "regConfirm");

    // Live password strength indicator (client-side only)
    document.getElementById("regPassword").addEventListener("input", function () {
      const val   = this.value;
      const wrap  = document.getElementById("pwStrength");
      const bar   = document.getElementById("pwStrengthBar");
      const label = document.getElementById("pwStrengthLabel");
      if (!val) { wrap.style.display = "none"; return; }
      wrap.style.display = "flex";
      let score = 0;
      if (val.length >= 6)           score++;
      if (val.length >= 10)          score++;
      if (/[A-Z]/.test(val))         score++;
      if (/[0-9]/.test(val))         score++;
      if (/[^A-Za-z0-9]/.test(val))  score++;
      const lvls = [
        { l:"Too short", c:"#EF4444", w:"20%"  },
        { l:"Weak",      c:"#F97316", w:"40%"  },
        { l:"Fair",      c:"#EAB308", w:"60%"  },
        { l:"Good",      c:"#22C55E", w:"80%"  },
        { l:"Strong",    c:"#16A34A", w:"100%" }
      ];
      const lvl         = lvls[Math.min(score, 4)];
      bar.style.width      = lvl.w;
      bar.style.background = lvl.c;
      label.textContent    = lvl.l;
      label.style.color    = lvl.c;
    });

    // Form submit — calls POST /api/auth/register
    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name     = document.getElementById("regName").value.trim();
      const email    = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value.trim();
      const confirm  = document.getElementById("regConfirm").value.trim();
      const agreed   = document.getElementById("agreeTerms").checked;

      // Clear all errors
      ["nameError","emailError","passwordError","confirmError","termsError"]
        .forEach(id => document.getElementById(id).textContent = "");

      // Client-side validation
      let valid = true;
      if (!name)   { document.getElementById("nameError").textContent = "Please enter your name."; valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
        { document.getElementById("emailError").textContent = "Please enter a valid email."; valid = false; }
      if (password.length < 6)
        { document.getElementById("passwordError").textContent = "Password must be at least 6 characters."; valid = false; }
      if (password !== confirm)
        { document.getElementById("confirmError").textContent = "Passwords do not match."; valid = false; }
      if (!agreed)
        { document.getElementById("termsError").textContent = "You must agree to the terms."; valid = false; }
      if (!valid) return;

      // Show spinner
      document.querySelector(".btn-text").style.display    = "none";
      document.querySelector(".btn-spinner").style.display = "inline";
      document.getElementById("registerBtn").disabled      = true;

      // Call POST /api/auth/register (password hashed on server with bcrypt)
      const result = await registerUser(name, email, password);

      // Restore button
      document.querySelector(".btn-text").style.display    = "inline";
      document.querySelector(".btn-spinner").style.display = "none";
      document.getElementById("registerBtn").disabled      = false;

      if (result.success) {
        showMsg("success",
          `<i class="fa-solid fa-circle-check"></i>
           Account created! Redirecting to your dashboard…`
        );
        // Account is created AND logged in (JWT saved) — go straight to home
        setTimeout(() => { window.location.href = "index.html"; }, 1600);
      } else {
        showMsg("error",
          `<i class="fa-solid fa-circle-xmark"></i> ${result.message}`
        );
      }
    });

    function showMsg(type, html) {
      const box = document.getElementById("authMessage");
      box.className     = `auth-message auth-message--${type}`;
      box.innerHTML     = html;
      box.style.display = "flex";
    }
  </script>
</body>
</html>
