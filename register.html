<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <!-- ===== NAVBAR (minimal) ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden; pointer-events:none; flex:1;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== REGISTER CARD ===== -->
  <main class="auth-page">
    <div class="auth-card">

      <!-- Card header -->
      <div class="auth-card-header">
        <div class="auth-icon auth-icon--register"><i class="fa-solid fa-user-plus"></i></div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Join ShopEasy — it's free and takes 30 seconds</p>
      </div>

      <!-- Toast / message area -->
      <div class="auth-message" id="authMessage" style="display:none;"></div>

      <!-- Registration form -->
      <form class="auth-form" id="registerForm" novalidate>

        <!-- Full name field -->
        <div class="form-group">
          <label class="form-label" for="regName">
            <i class="fa-solid fa-user"></i> Full Name
          </label>
          <input
            type="text"
            id="regName"
            class="form-input"
            placeholder="Jane Doe"
            autocomplete="name"
            required
          />
          <span class="field-error" id="nameError"></span>
        </div>

        <!-- Email field -->
        <div class="form-group">
          <label class="form-label" for="regEmail">
            <i class="fa-solid fa-envelope"></i> Email Address
          </label>
          <input
            type="email"
            id="regEmail"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label class="form-label" for="regPassword">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-password-wrap">
            <input
              type="password"
              id="regPassword"
              class="form-input"
              placeholder="Min 6 characters"
              autocomplete="new-password"
              required
            />
            <button type="button" class="toggle-pw" id="toggleRegPw" aria-label="Toggle password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="pw-strength" id="pwStrength" style="display:none;">
            <div class="pw-strength-bar" id="pwStrengthBar"></div>
            <span class="pw-strength-label" id="pwStrengthLabel"></span>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Confirm password field -->
        <div class="form-group">
          <label class="form-label" for="regConfirm">
            <i class="fa-solid fa-lock"></i> Confirm Password
          </label>
          <div class="input-password-wrap">
            <input
              type="password"
              id="regConfirm"
              class="form-input"
              placeholder="Repeat your password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="toggle-pw" id="toggleConfPw" aria-label="Toggle confirm password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>

        <!-- Terms checkbox -->
        <div class="form-group form-check">
          <input type="checkbox" id="agreeTerms" class="check-input"/>
          <label for="agreeTerms" class="check-label">
            I agree to the <a href="#" class="auth-link">Terms &amp; Conditions</a>
          </label>
          <span class="field-error" id="termsError"></span>
        </div>

        <!-- Submit button -->
        <button type="submit" class="auth-btn auth-btn--register" id="registerBtn">
          <span class="btn-text"><i class="fa-solid fa-user-plus"></i> Create Account</span>
          <span class="btn-spinner" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>

      </form>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Switch to login -->
      <p class="auth-switch">
        Already have an account?
        <a href="login.html" class="auth-switch-link">Sign in here <i class="fa-solid fa-arrow-right"></i></a>
      </p>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    /* ---- register.html specific init ---- */
    updateCartBadge();

    /* If already logged in, redirect home */
    if (getLoggedInUser()) {
      window.location.href = "index.html";
    }

    /* Toggle password visibility – both fields */
    function makeToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener("click", function () {
        const pw   = document.getElementById(inputId);
        const icon = this.querySelector("i");
        if (pw.type === "password") {
          pw.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          pw.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      });
    }
    makeToggle("toggleRegPw",  "regPassword");
    makeToggle("toggleConfPw", "regConfirm");

    /* Live password strength indicator */
    document.getElementById("regPassword").addEventListener("input", function () {
      const val     = this.value;
      const bar     = document.getElementById("pwStrengthBar");
      const label   = document.getElementById("pwStrengthLabel");
      const wrapper = document.getElementById("pwStrength");

      if (!val) { wrapper.style.display = "none"; return; }
      wrapper.style.display = "flex";

      /* Simple strength scoring */
      let score = 0;
      if (val.length >= 6)                        score++;
      if (val.length >= 10)                       score++;
      if (/[A-Z]/.test(val))                      score++;
      if (/[0-9]/.test(val))                      score++;
      if (/[^A-Za-z0-9]/.test(val))               score++;

      const levels = [
        { label: "Too short",  color: "#EF4444", width: "20%"  },
        { label: "Weak",       color: "#F97316", width: "40%"  },
        { label: "Fair",       color: "#EAB308", width: "60%"  },
        { label: "Good",       color: "#22C55E", width: "80%"  },
        { label: "Strong",     color: "#16A34A", width: "100%" },
      ];
      const lvl  = levels[Math.min(score, 4)];
      bar.style.width       = lvl.width;
      bar.style.background  = lvl.color;
      label.textContent     = lvl.label;
      label.style.color     = lvl.color;
    });

    /* Handle register form submit */
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name     = document.getElementById("regName").value.trim();
      const email    = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value.trim();
      const confirm  = document.getElementById("regConfirm").value.trim();
      const agreed   = document.getElementById("agreeTerms").checked;

      /* Clear errors */
      ["nameError","emailError","passwordError","confirmError","termsError"]
        .forEach(id => document.getElementById(id).textContent = "");

      /* Validate */
      let valid = true;
      if (!name)    { document.getElementById("nameError").textContent    = "Please enter your name.";              valid = false; }
      if (!email)   { document.getElementById("emailError").textContent   = "Please enter your email.";             valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                      document.getElementById("emailError").textContent   = "Please enter a valid email address.";  valid = false; }
      if (password.length < 6) { document.getElementById("passwordError").textContent = "Password must be at least 6 characters."; valid = false; }
      if (password !== confirm) { document.getElementById("confirmError").textContent = "Passwords do not match.";  valid = false; }
      if (!agreed)  { document.getElementById("termsError").textContent   = "You must agree to the terms.";         valid = false; }
      if (!valid) return;

      /* Spinner */
      document.querySelector(".btn-text").style.display    = "none";
      document.querySelector(".btn-spinner").style.display = "inline";

      setTimeout(() => {
        const result = registerUser(name, email, password);   // auth fn in script.js

        document.querySelector(".btn-text").style.display    = "inline";
        document.querySelector(".btn-spinner").style.display = "none";

        if (result.success) {
          showAuthMessage("success", `<i class="fa-solid fa-circle-check"></i> Account created! Redirecting to login…`);
          setTimeout(() => { window.location.href = "login.html"; }, 1800);
        } else {
          showAuthMessage("error", `<i class="fa-solid fa-circle-xmark"></i> ${result.message}`);
        }
      }, 800);
    });

    function showAuthMessage(type, html) {
      const box = document.getElementById("authMessage");
      box.className = `auth-message auth-message--${type}`;
      box.innerHTML = html;
      box.style.display = "flex";
    }
  </script>
</body>
</html>
