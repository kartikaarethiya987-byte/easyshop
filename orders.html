<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP EASY – My Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== PAGE LOADER ===== -->
  <div id="pageLoader">
    <span class="loader-logo">SHOP<em>EASY</em></span>
    <div class="loader-ring"></div>
    <p class="loader-text">Fetching your orders…</p>
  </div>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">
        <span class="logo-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="logo-text">SHOP<em>EASY</em></span>
      </a>
      <div class="search-wrap" style="visibility:hidden;pointer-events:none;">
        <input type="text" class="search-input" placeholder=""/>
        <button class="search-btn"></button>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <div class="nav-auth" id="navAuth"></div>
        <a href="cart.html" class="nav-link cart-nav-btn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== ORDERS PAGE ===== -->
  <main class="container orders-page">

    <div class="orders-page-header">
      <div>
        <h1 class="page-title">
          <i class="fa-solid fa-box-open"></i> My Orders
        </h1>
        <!--
          Order count line is updated by renderOrdersPage()
          e.g. "You have placed 3 orders."
        -->
        <p class="page-sub" id="orderCountLine">
          View all your past purchases below.
        </p>
      </div>
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Continue Shopping
      </a>
    </div>

    <!-- Toast (for any future use) -->
    <div class="toast" id="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastMsg"></span>
    </div>

    <!--
      renderOrdersPage() (script.js §13) renders each order card here.

      Each order card shows:
        • Order ID and date
        • Status badge ("Paid" in green)
        • Payment method badge (UPI / Credit Card / COD)
        • Grand total
        • Thumbnail strip of first 3 product images
        • Expandable "View items" list:
            – Product image, name, quantity, unit price, line total
    -->
    <div id="ordersContainer"></div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner container">
      <div class="footer-brand">
        <span class="logo-text" style="font-size:1.3rem">SHOP<em>EASY</em></span>
        <p>Smart shopping, simplified.</p>
      </div>
      <div class="footer-links">
        <h4>Pages</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 ShopEasy. Made with <i class="fa-solid fa-heart"></i></p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    /* ── orders.html initialisation ── */
    seedDefaultData();

    /*
     * 🔒 PAGE PROTECTION
     * Only logged-in users should see their order history.
     * protectPage() redirects to login.html with a saved redirect URL
     * so the user comes back here after logging in.
     */
    protectPage();

    renderNavAuth();
    updateCartBadge();

    /*
     * renderOrdersPage() (script.js §13):
     *   1. Checks isLoggedIn() — shows lock message if not.
     *   2. Reads getUserOrders() — shows empty state if none.
     *   3. For each order renders a card with:
     *        – orderId, date, status (Paid), paymentMethod, total
     *        – Thumbnail strip (first 3 item images)
     *        – Expandable product list with qty, price, subtotal
     */
    renderOrdersPage();

    function hideLoader() {
      var l = document.getElementById("pageLoader");
      if (l) { l.classList.add("hidden"); setTimeout(function(){ l.remove(); }, 450); }
    }
    hideLoader();
  </script>
</body>
</html>
